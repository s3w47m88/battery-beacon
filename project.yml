name: FullBatteryAlert
options:
  bundleIdPrefix: com.spencerhill
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: VP38993WK6
    MARKETING_VERSION: "1.0.2"
    CURRENT_PROJECT_VERSION: "10"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Apple Distribution"
    PROVISIONING_PROFILE_SPECIFIER: "com.spencerhill.fullbatteryalert AppStore"
    ENABLE_HARDENED_RUNTIME: YES
targets:
  FullBatteryAlert:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/FullBatteryAlert
      - path: Sources/FullBatteryAlertShared
    # Widget extension target temporarily disabled for 0.1.4 — needs
    # App Group `group.com.spencerhill.fullbatteryalert` registered in
    # ASC + APP_GROUPS capability enabled on both bundle IDs (manual one-time
    # step; Spaceship::ConnectAPI has no app-group endpoint). Re-enable for 0.1.5.
    # dependencies:
    #   - target: FullBatteryAlertWidgets
    info:
      path: Sources/FullBatteryAlert/Info.plist
      properties:
        CFBundleDisplayName: Battery Charged Notification
        CFBundleName: Battery Charged Notification
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSUIElement: YES
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "MIT License"
        LSApplicationCategoryType: public.app-category.utilities
        CFBundleIconFile: AppIcon
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: Sources/FullBatteryAlert/FullBatteryAlert.entitlements
      properties:
        com.apple.security.app-sandbox: true
        # App Group disabled for 0.1.4 — see widget dependency comment above.
        # com.apple.security.application-groups:
        #   - group.com.spencerhill.fullbatteryalert
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spencerhill.fullbatteryalert
        PRODUCT_NAME: "Battery Charged Notification"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_KEY_LSUIElement: YES

  FullBatteryAlertWidgets:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    productType: com.apple.product-type.app-extension
    sources:
      - path: Sources/FullBatteryAlertWidgets
        excludes:
          - "*.entitlements"
          - "Info.plist"
      - path: Sources/FullBatteryAlertShared
    info:
      path: Sources/FullBatteryAlertWidgets/Info.plist
      properties:
        CFBundleDisplayName: Battery Charged Widgets
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Sources/FullBatteryAlertWidgets/FullBatteryAlertWidgets.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.spencerhill.fullbatteryalert
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spencerhill.fullbatteryalert.widgets
        PRODUCT_NAME: FullBatteryAlertWidgets
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "com.spencerhill.fullbatteryalert.widgets AppStore"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../../../../Frameworks @executable_path/../../Frameworks"
