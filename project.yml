name: BatteryBeacon
options:
  bundleIdPrefix: com.spencerhill
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: VP38993WK6
    MARKETING_VERSION: "1.0.6"
    CURRENT_PROJECT_VERSION: "15"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Apple Distribution"
    PROVISIONING_PROFILE_SPECIFIER: "com.spencerhill.batterybeacon AppStore"
    ENABLE_HARDENED_RUNTIME: YES
targets:
  BatteryBeacon:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/BatteryBeacon
      - path: Sources/BatteryBeaconShared
    # Widget extension target temporarily disabled — needs
    # App Group `group.com.spencerhill.batterybeacon` registered in
    # ASC + APP_GROUPS capability enabled on both bundle IDs (manual one-time
    # step; Spaceship::ConnectAPI has no app-group endpoint). Re-enable later.
    # dependencies:
    #   - target: BatteryBeaconWidgets
    info:
      path: Sources/BatteryBeacon/Info.plist
      properties:
        CFBundleDisplayName: Battery Beacon
        CFBundleName: Battery Beacon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSUIElement: YES
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "MIT License"
        LSApplicationCategoryType: public.app-category.utilities
        CFBundleIconFile: AppIcon
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: Sources/BatteryBeacon/BatteryBeacon.entitlements
      properties:
        com.apple.security.app-sandbox: true
        # Outbound HTTPS for Umami analytics (analytics.theportlandcompany.com).
        com.apple.security.network.client: true
        # App Group disabled — see widget dependency comment above.
        # com.apple.security.application-groups:
        #   - group.com.spencerhill.batterybeacon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spencerhill.batterybeacon
        PRODUCT_NAME: "Battery Beacon"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_KEY_LSUIElement: YES

  BatteryBeaconWidgets:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    productType: com.apple.product-type.app-extension
    sources:
      - path: Sources/BatteryBeaconWidgets
        excludes:
          - "*.entitlements"
          - "Info.plist"
      - path: Sources/BatteryBeaconShared
    info:
      path: Sources/BatteryBeaconWidgets/Info.plist
      properties:
        CFBundleDisplayName: Battery Beacon Widgets
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Sources/BatteryBeaconWidgets/BatteryBeaconWidgets.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.spencerhill.batterybeacon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spencerhill.batterybeacon.widgets
        PRODUCT_NAME: BatteryBeaconWidgets
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "com.spencerhill.batterybeacon.widgets AppStore"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../../../../Frameworks @executable_path/../../Frameworks"
